<script>
  var userAgent = navigator.userAgent || navigator.vendor || window.opera;

  if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
    // Redirect to Apple App Store
    window.location.href = "https://apps.apple.com/ca/app/mb-ready/id6761196500";
  } else if (/android/i.test(userAgent)) {
    // Redirect to Google Play Store
    window.location.href = "https://play.google.com/store/apps/details?id=ca.mb.gov.mbready";
  } else {
    // Fallback for Desktop users
    window.location.href = "https://mbready.manitoba.ca";
  }
</script>
